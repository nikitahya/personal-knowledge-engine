services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pke
      POSTGRES_PASSWORD: pke
      POSTGRES_DB: pke
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn pke.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

volumes:
  postgres_data: